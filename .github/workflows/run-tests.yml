name: Run Web Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_groups:
        description: 'Test groups to run (comma-separated, e.g., payments-ui,workbench-ui)'
        required: false
        default: 'payments-ui,workbench-ui'
      test_class:
        description: 'Specific test class to run (e.g., tests.LoginTest)'
        required: false
        default: ''
      test_method:
        description: 'Specific test method to run (e.g., verifyUserCanLogin)'
        required: false
        default: ''
      environment:
        description: 'Environment to use (UAT or DEMO)'
        required: false
        default: 'DEMO'
        type: choice
        options:
          - UAT
          - DEMO
  repository_dispatch:
    types: [trigger-tests]

jobs:
  test:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'DEMO' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: mvn clean install -DskipTests

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium"

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libxshmfence1

      - name: Create testng.xml
        run: |
          TEST_CLASS="${{ github.event.inputs.test_class }}"
          TEST_METHOD="${{ github.event.inputs.test_method }}"

          # If specific test class provided, create targeted testng.xml
          if [ -n "$TEST_CLASS" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?>' > testng.xml
            echo '<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">' >> testng.xml
            echo '<suite name="Web Automation Suite" verbose="1">' >> testng.xml
            echo '    <test name="Individual Test">' >> testng.xml
            echo '        <classes>' >> testng.xml
            echo "            <class name=\"$TEST_CLASS\">" >> testng.xml
            if [ -n "$TEST_METHOD" ]; then
              echo '                <methods>' >> testng.xml
              echo "                    <include name=\"$TEST_METHOD\" />" >> testng.xml
              echo '                </methods>' >> testng.xml
            fi
            echo '            </class>' >> testng.xml
            echo '        </classes>' >> testng.xml
            echo '    </test>' >> testng.xml
            echo '</suite>' >> testng.xml
          else
            # Create testng.xml for groups
            GROUPS="${{ github.event.inputs.test_groups || 'payments-ui,workbench-ui' }}"
            echo '<?xml version="1.0" encoding="UTF-8"?>' > testng.xml
            echo '<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">' >> testng.xml
            echo '<suite name="Web Automation Suite" verbose="1">' >> testng.xml
            echo '    <test name="Group Tests">' >> testng.xml
            echo '        <groups>' >> testng.xml
            echo '            <run>' >> testng.xml
            IFS=',' read -ra GROUP_ARRAY <<< "$GROUPS"
            for group in "${GROUP_ARRAY[@]}"; do
              group=$(echo "$group" | tr -d ' ')
              echo "                <include name=\"$group\" />" >> testng.xml
            done
            echo '            </run>' >> testng.xml
            echo '        </groups>' >> testng.xml
            echo '        <packages>' >> testng.xml
            echo '            <package name="tests.*"/>' >> testng.xml
            echo '        </packages>' >> testng.xml
            echo '    </test>' >> testng.xml
            echo '</suite>' >> testng.xml
          fi
          echo "Generated testng.xml:"
          cat testng.xml

      - name: Create .env file
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          BROWSER: ${{ secrets.BROWSER }}
          HEADLESS: ${{ secrets.HEADLESS }}
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          COUNTRY: ${{ secrets.COUNTRY }}
          STATE: ${{ secrets.STATE }}
          LGA: ${{ secrets.LGA }}
          WARD: ${{ secrets.WARD }}
          VILLAGE: ${{ secrets.VILLAGE }}
          AREA: ${{ secrets.AREA }}
        run: |
          echo "Debug: BASE_URL is set: $([ -n "$BASE_URL" ] && echo 'YES' || echo 'NO')"

          echo "Using ${{ github.event.inputs.environment || 'DEMO' }} environment"
          {
            echo "BASE_URL=$BASE_URL"
            echo "BROWSER=${BROWSER:-chromium}"
            echo "HEADLESS=${HEADLESS:-true}"
            echo "USERNAME=$USERNAME"
            echo "PASSWORD=$PASSWORD"
            echo "COUNTRY=$COUNTRY"
            echo "STATE=$STATE"
            echo "LGA=$LGA"
            echo "WARD=$WARD"
            echo "VILLAGE=$VILLAGE"
            echo "AREA=$AREA"
          } > .env

          echo "Generated .env file:"
          cat .env | sed 's/PASSWORD=.*/PASSWORD=***/'
          echo ""
          echo "Verify .env file exists:"
          ls -la .env

      - name: Validate .env file
        run: |
          echo "Validating .env file..."
          missing=0
          for key in BASE_URL USERNAME COUNTRY STATE; do
            value=$(grep "^$key=" .env | cut -d'=' -f2)
            if [ -z "$value" ]; then
              echo "ERROR: $key is empty in .env file"
              missing=1
            else
              echo "OK: $key is set"
            fi
          done
          if [ $missing -eq 1 ]; then
            echo "FAILED: Required environment variables are missing. Check GitHub secrets."
            exit 1
          fi
          echo "Validation passed."

      - name: Display environment info
        run: |
          echo "=========================================="
          echo "  TEST EXECUTION ENVIRONMENT"
          echo "=========================================="
          echo "Environment: ${{ github.event.inputs.environment || 'DEMO' }}"
          echo "Test Groups: ${{ github.event.inputs.test_groups || 'payments-ui,workbench-ui' }}"
          if [ -n "${{ github.event.inputs.test_class }}" ]; then
            echo "Test Class: ${{ github.event.inputs.test_class }}"
          fi
          if [ -n "${{ github.event.inputs.test_method }}" ]; then
            echo "Test Method: ${{ github.event.inputs.test_method }}"
          fi
          echo ""
          echo "Configuration (from .env):"
          grep -E "^(BASE_URL|BROWSER|HEADLESS|USERNAME|COUNTRY|STATE)" .env || echo "No .env file found"
          echo "=========================================="
          echo ""

      - name: Run tests
        run: mvn test
        env:
          CI: true
