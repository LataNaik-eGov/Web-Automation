name: Run Web Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_groups:
        description: 'Test groups to run (comma-separated, e.g., payments-ui,workbench-ui)'
        required: false
        default: 'payments-ui,workbench-ui'
      environment:
        description: 'Environment to use (UAT or DEMO)'
        required: false
        default: 'DEMO'
        type: choice
        options:
          - UAT
          - DEMO
  repository_dispatch:
    types: [trigger-tests]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: mvn clean install -DskipTests

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium"

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libxshmfence1

      - name: Create testng.xml for groups
        run: |
          GROUPS="${{ github.event.inputs.test_groups || 'payments-ui,workbench-ui' }}"
          
          # Find test classes that contain the specified groups
          CLASSES=""
          for group in $(echo $GROUPS | tr ',' ' '); do
            FILES=$(grep -l "@Test.*groups.*$group\|groups.*=.*$group" src/test/java/tests/*.java 2>/dev/null || true)
            for file in $FILES; do
              class=$(basename "$file" .java)
              if [[ ! "$CLASSES" =~ "$class" ]]; then
                CLASSES="$CLASSES $class"
              fi
            done
          done
          
          echo '<?xml version="1.0" encoding="UTF-8"?>' > testng.xml
          echo '<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">' >> testng.xml
          echo '<suite name="Web Automation Suite" verbose="1">' >> testng.xml
          echo '    <test name="Group Tests">' >> testng.xml
          echo '        <groups>' >> testng.xml
          echo '            <run>' >> testng.xml
          IFS=',' read -ra GROUP_ARRAY <<< "$GROUPS"
          for group in "${GROUP_ARRAY[@]}"; do
            echo "                <include name=\"$group\" />" >> testng.xml
          done
          echo '            </run>' >> testng.xml
          echo '        </groups>' >> testng.xml
          echo '        <classes>' >> testng.xml
          for class in $CLASSES; do
            echo "            <class name=\"tests.$class\" />" >> testng.xml
          done
          echo '        </classes>' >> testng.xml
          echo '    </test>' >> testng.xml
          echo '</suite>' >> testng.xml
          cat testng.xml

      - name: Create .env file
        env:
          ENV_NAME: ${{ github.event.inputs.environment || 'DEMO' }}
          UAT_BASE_URL: ${{ secrets.UAT_BASE_URL }}
          DEMO_BASE_URL: ${{ secrets.DEMO_BASE_URL }}
          UAT_USERNAME: ${{ secrets.UAT_USERNAME }}
          DEMO_USERNAME: ${{ secrets.DEMO_USERNAME }}
          UAT_PASSWORD: ${{ secrets.UAT_PASSWORD }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
          UAT_COUNTRY: ${{ secrets.UAT_COUNTRY }}
          DEMO_COUNTRY: ${{ secrets.DEMO_COUNTRY }}
          UAT_STATE: ${{ secrets.UAT_STATE }}
          DEMO_STATE: ${{ secrets.DEMO_STATE }}
          UAT_LGA: ${{ secrets.UAT_LGA }}
          DEMO_LGA: ${{ secrets.DEMO_LGA }}
          UAT_WARD: ${{ secrets.UAT_WARD }}
          DEMO_WARD: ${{ secrets.DEMO_WARD }}
          UAT_VILLAGE: ${{ secrets.UAT_VILLAGE }}
          DEMO_VILLAGE: ${{ secrets.DEMO_VILLAGE }}
          UAT_AREA: ${{ secrets.UAT_AREA }}
          DEMO_AREA: ${{ secrets.DEMO_AREA }}
        run: |
          if [ "$ENV_NAME" = "UAT" ]; then
            BASE_URL="$UAT_BASE_URL"
            USERNAME="$UAT_USERNAME"
            PASSWORD="$UAT_PASSWORD"
            COUNTRY="$UAT_COUNTRY"
            STATE="$UAT_STATE"
            LGA="$UAT_LGA"
            WARD="$UAT_WARD"
            VILLAGE="$UAT_VILLAGE"
            AREA="$UAT_AREA"
          else
            BASE_URL="$DEMO_BASE_URL"
            USERNAME="$DEMO_USERNAME"
            PASSWORD="$DEMO_PASSWORD"
            COUNTRY="$DEMO_COUNTRY"
            STATE="$DEMO_STATE"
            LGA="$DEMO_LGA"
            WARD="$DEMO_WARD"
            VILLAGE="$DEMO_VILLAGE"
            AREA="$DEMO_AREA"
          fi
          
          cat > .env <<EOF
          BASE_URL=$BASE_URL
          BROWSER=chromium
          HEADLESS=true
          USERNAME=$USERNAME
          PASSWORD=$PASSWORD
          COUNTRY=$COUNTRY
          STATE=$STATE
          LGA=$LGA
          WARD=$WARD
          VILLAGE=$VILLAGE
          AREA=$AREA
          EOF
          cat .env

      - name: Run tests
        run: mvn test
        env:
          CI: true
