name: Run Web Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_groups:
        description: 'Test groups to run (comma-separated, e.g., payments-ui,workbench-ui)'
        required: false
        default: 'payments-ui,workbench-ui'
  repository_dispatch:
    types: [trigger-tests]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: mvn clean install -DskipTests

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdbus-1-3 \
            libdrm2 \
            libexpat1 \
            libgbm1 \
            libgcc-s1 \
            libglib2.0-0t64 \
            libgtk-3-0t64 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxrandr2 \
            libxshmfence1 \
            wget \
            ca-certificates

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium"

      - name: Create testng.xml for groups
        run: |
          GROUPS="${{ github.event.inputs.test_groups || 'payments-ui,workbench-ui' }}"
          echo '<?xml version="1.0" encoding="UTF-8"?>' > testng.xml
          echo '<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">' >> testng.xml
          echo '<suite name="Web Automation Suite" verbose="1">' >> testng.xml
          echo '    <test name="Group Tests">' >> testng.xml
          echo '        <groups>' >> testng.xml
          echo '            <run>' >> testng.xml
          IFS=',' read -ra GROUP_ARRAY <<< "$GROUPS"
          for group in "${GROUP_ARRAY[@]}"; do
            echo "                <include name=\"$group\" />" >> testng.xml
          done
          echo '            </run>' >> testng.xml
          echo '        </groups>' >> testng.xml
          echo '        <packages>' >> testng.xml
          echo '            <package name="tests.*"/>' >> testng.xml
          echo '        </packages>' >> testng.xml
          echo '    </test>' >> testng.xml
          echo '</suite>' >> testng.xml
          cat testng.xml

      - name: Run tests
        run: mvn test
        env:
          CI: true
          HEADLESS: true
