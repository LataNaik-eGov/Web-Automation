name: Run Web Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_groups:
        description: 'Test groups to run (comma-separated, e.g., payments-ui,workbench-ui)'
        required: false
        default: 'payments-ui,workbench-ui'
      test_class:
        description: 'Specific test class to run (e.g., tests.LoginTest)'
        required: false
        default: ''
      test_method:
        description: 'Specific test method to run (e.g., verifyUserCanLogin)'
        required: false
        default: ''
      environment:
        description: 'Environment to use (UAT or DEMO)'
        required: false
        default: 'DEMO'
        type: choice
        options:
          - UAT
          - DEMO
  repository_dispatch:
    types: [trigger-tests]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: mvn clean install -DskipTests

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium"

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libxshmfence1

      - name: Create testng.xml
        run: |
          TEST_CLASS="${{ github.event.inputs.test_class }}"
          TEST_METHOD="${{ github.event.inputs.test_method }}"

          # If specific test class provided, create targeted testng.xml
          if [ -n "$TEST_CLASS" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?>' > testng.xml
            echo '<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">' >> testng.xml
            echo '<suite name="Web Automation Suite" verbose="1">' >> testng.xml
            echo '    <test name="Individual Test">' >> testng.xml
            echo '        <classes>' >> testng.xml
            echo "            <class name=\"$TEST_CLASS\">" >> testng.xml
            if [ -n "$TEST_METHOD" ]; then
              echo '                <methods>' >> testng.xml
              echo "                    <include name=\"$TEST_METHOD\" />" >> testng.xml
              echo '                </methods>' >> testng.xml
            fi
            echo '            </class>' >> testng.xml
            echo '        </classes>' >> testng.xml
            echo '    </test>' >> testng.xml
            echo '</suite>' >> testng.xml
          else
            # Create testng.xml for groups
            GROUPS="${{ github.event.inputs.test_groups || 'payments-ui,workbench-ui' }}"
            echo '<?xml version="1.0" encoding="UTF-8"?>' > testng.xml
            echo '<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">' >> testng.xml
            echo '<suite name="Web Automation Suite" verbose="1">' >> testng.xml
            echo '    <test name="Group Tests">' >> testng.xml
            echo '        <groups>' >> testng.xml
            echo '            <run>' >> testng.xml
            IFS=',' read -ra GROUP_ARRAY <<< "$GROUPS"
            for group in "${GROUP_ARRAY[@]}"; do
              group=$(echo "$group" | tr -d ' ')
              echo "                <include name=\"$group\" />" >> testng.xml
            done
            echo '            </run>' >> testng.xml
            echo '        </groups>' >> testng.xml
            echo '        <packages>' >> testng.xml
            echo '            <package name="tests.*"/>' >> testng.xml
            echo '        </packages>' >> testng.xml
            echo '    </test>' >> testng.xml
            echo '</suite>' >> testng.xml
          fi
          echo "Generated testng.xml:"
          cat testng.xml

      - name: Create .env file
        env:
          ENV_NAME: ${{ github.event.inputs.environment || 'DEMO' }}
          UAT_BASE_URL: ${{ secrets.UAT_BASE_URL }}
          DEMO_BASE_URL: ${{ secrets.DEMO_BASE_URL }}
          UAT_USERNAME: ${{ secrets.UAT_USERNAME }}
          DEMO_USERNAME: ${{ secrets.DEMO_USERNAME }}
          UAT_PASSWORD: ${{ secrets.UAT_PASSWORD }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
          UAT_COUNTRY: ${{ secrets.UAT_COUNTRY }}
          DEMO_COUNTRY: ${{ secrets.DEMO_COUNTRY }}
          UAT_STATE: ${{ secrets.UAT_STATE }}
          DEMO_STATE: ${{ secrets.DEMO_STATE }}
          UAT_LGA: ${{ secrets.UAT_LGA }}
          DEMO_LGA: ${{ secrets.DEMO_LGA }}
          UAT_WARD: ${{ secrets.UAT_WARD }}
          DEMO_WARD: ${{ secrets.DEMO_WARD }}
          UAT_VILLAGE: ${{ secrets.UAT_VILLAGE }}
          DEMO_VILLAGE: ${{ secrets.DEMO_VILLAGE }}
          UAT_AREA: ${{ secrets.UAT_AREA }}
          DEMO_AREA: ${{ secrets.DEMO_AREA }}
        run: |
          if [ "$ENV_NAME" = "UAT" ]; then
            echo "BASE_URL=$UAT_BASE_URL" > .env
            echo "BROWSER=chromium" >> .env
            echo "HEADLESS=true" >> .env
            echo "USERNAME=$UAT_USERNAME" >> .env
            echo "PASSWORD=$UAT_PASSWORD" >> .env
            echo "COUNTRY=$UAT_COUNTRY" >> .env
            echo "STATE=$UAT_STATE" >> .env
            echo "LGA=$UAT_LGA" >> .env
            echo "WARD=$UAT_WARD" >> .env
            echo "VILLAGE=$UAT_VILLAGE" >> .env
            echo "AREA=$UAT_AREA" >> .env
          else
            echo "BASE_URL=$DEMO_BASE_URL" > .env
            echo "BROWSER=chromium" >> .env
            echo "HEADLESS=true" >> .env
            echo "USERNAME=$DEMO_USERNAME" >> .env
            echo "PASSWORD=$DEMO_PASSWORD" >> .env
            echo "COUNTRY=$DEMO_COUNTRY" >> .env
            echo "STATE=$DEMO_STATE" >> .env
            echo "LGA=$DEMO_LGA" >> .env
            echo "WARD=$DEMO_WARD" >> .env
            echo "VILLAGE=$DEMO_VILLAGE" >> .env
            echo "AREA=$DEMO_AREA" >> .env
          fi
          
          echo "Generated .env file:"
          cat .env | sed 's/PASSWORD=.*/PASSWORD=***/'

      - name: Display environment info
        run: |
          echo "=========================================="
          echo "  TEST EXECUTION ENVIRONMENT"
          echo "=========================================="
          echo "Environment: ${{ github.event.inputs.environment || 'DEMO' }}"
          echo "Test Groups: ${{ github.event.inputs.test_groups || 'payments-ui,workbench-ui' }}"
          if [ -n "${{ github.event.inputs.test_class }}" ]; then
            echo "Test Class: ${{ github.event.inputs.test_class }}"
          fi
          if [ -n "${{ github.event.inputs.test_method }}" ]; then
            echo "Test Method: ${{ github.event.inputs.test_method }}"
          fi
          echo ""
          echo "Configuration (from .env):"
          grep -E "^(BASE_URL|BROWSER|HEADLESS|USERNAME|COUNTRY|STATE)" .env || echo "No .env file found"
          echo "=========================================="
          echo ""

      - name: Run tests
        run: mvn test
        env:
          CI: true
