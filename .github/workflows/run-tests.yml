name: Run Web Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_groups:
        description: 'Test groups to run (comma-separated, e.g., payments-ui,workbench-ui)'
        required: false
        default: 'payments-ui,workbench-ui'
      test_class:
        description: 'Specific test class to run (e.g., tests.LoginTest)'
        required: false
        default: ''
      test_method:
        description: 'Specific test method to run (e.g., verifyUserCanLogin)'
        required: false
        default: ''
      environment:
        description: 'Environment to use (UAT or DEMO)'
        required: false
        default: 'DEMO'
        type: choice
        options:
          - UAT
          - DEMO
  repository_dispatch:
    types: [trigger-tests]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: mvn clean install -DskipTests

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium"

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libxshmfence1

      - name: Create testng.xml
        run: |
          TEST_CLASS="${{ github.event.inputs.test_class }}"
          TEST_METHOD="${{ github.event.inputs.test_method }}"

          # If specific test class provided, create targeted testng.xml
          if [ -n "$TEST_CLASS" ]; then
            cat > testng.xml <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">
<suite name="Web Automation Suite" verbose="1">
    <test name="Individual Test">
        <classes>
            <class name="$TEST_CLASS">
EOF
            if [ -n "$TEST_METHOD" ]; then
              cat >> testng.xml <<EOF
                <methods>
                    <include name="$TEST_METHOD" />
                </methods>
EOF
            fi
            cat >> testng.xml <<EOF
            </class>
        </classes>
    </test>
</suite>
EOF
          else
            # Create testng.xml for groups
            GROUPS="${{ github.event.inputs.test_groups || 'payments-ui,workbench-ui' }}"
            cat > testng.xml <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE suite SYSTEM "https://testng.org/testng-1.0.dtd">
<suite name="Web Automation Suite" verbose="1">
    <test name="Group Tests">
        <groups>
            <run>
EOF
            IFS=',' read -ra GROUP_ARRAY <<< "$GROUPS"
            for group in "${GROUP_ARRAY[@]}"; do
              group=$(echo "$group" | tr -d ' ')
              echo "                <include name=\"$group\" />" >> testng.xml
            done
            cat >> testng.xml <<EOF
            </run>
        </groups>
        <packages>
            <package name="tests.*"/>
        </packages>
    </test>
</suite>
EOF
          fi
          echo "Generated testng.xml:"
          cat testng.xml

      - name: Create .env file
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'DEMO' }}"

          if [ "$ENV_NAME" = "UAT" ]; then
            cat > .env <<EOF
BASE_URL=${{ secrets.UAT_BASE_URL }}
BROWSER=chromium
HEADLESS=true
USERNAME=${{ secrets.UAT_USERNAME }}
PASSWORD=${{ secrets.UAT_PASSWORD }}
COUNTRY=${{ secrets.UAT_COUNTRY }}
STATE=${{ secrets.UAT_STATE }}
LGA=${{ secrets.UAT_LGA }}
WARD=${{ secrets.UAT_WARD }}
VILLAGE=${{ secrets.UAT_VILLAGE }}
AREA=${{ secrets.UAT_AREA }}
EOF
          else
            cat > .env <<EOF
BASE_URL=${{ secrets.DEMO_BASE_URL }}
BROWSER=chromium
HEADLESS=true
USERNAME=${{ secrets.DEMO_USERNAME }}
PASSWORD=${{ secrets.DEMO_PASSWORD }}
COUNTRY=${{ secrets.DEMO_COUNTRY }}
STATE=${{ secrets.DEMO_STATE }}
LGA=${{ secrets.DEMO_LGA }}
WARD=${{ secrets.DEMO_WARD }}
VILLAGE=${{ secrets.DEMO_VILLAGE }}
AREA=${{ secrets.DEMO_AREA }}
EOF
          fi

          echo "Generated .env file:"
          cat .env | sed 's/PASSWORD=.*/PASSWORD=***/'

      - name: Run tests
        run: mvn test
        env:
          CI: true
